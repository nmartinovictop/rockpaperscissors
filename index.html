<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Rock Paper Scissors</title>
    
</head>
<body>
    
    <h1>Welcome to Rock Paper Scissors!</h1>
    <h3>Please select your choice</h3>
    <button class="rock-btn" id="rock">Rock!</button>
    <button class="scissors-btn" id="scissors">Scissors!</button>
    <button class="paper-btn" id="paper">Paper!</button>
    <div class="display-round-winner" style="height: 50px; margin-top:25px"></div>
    <div class="display-score">
        <p class="computer-score"></p>
        <p class="human-score"></p>
    </div>
</body>
<script src="game.js"></script>
</html>
